name: json_xlsx_only_check

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: 检查变更文件是否仅含 .json / .xlsx
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // 获取 PR 变更文件列表
            const { data: files } = await github.rest.pulls.listFiles({
              owner,
              repo,
              pull_number: prNumber,
              per_page: 100
            });

            if (files.length === 0) {
              core.setFailed('没有检测到变更文件。');
              return;
            }

            const filenames = files.map(f => f.filename);
            core.info(`变更文件：${filenames.join('、')}`);

            // 判断所有文件后缀是否为 .json 或 .xlsx（忽略大小写）
            const allowedExtensions = ['.json', '.xlsx'];
            const allAllowed = files.every(f =>
              allowedExtensions.some(ext => f.filename.toLowerCase().endsWith(ext))
            );

            if (allAllowed) {
              core.info('所有变更文件均为 .json 或 .xlsx，检查通过。');
            } else {
              const disallowed = files
                .filter(f => !allowedExtensions.some(ext => f.filename.toLowerCase().endsWith(ext)))
                .map(f => f.filename);
              core.setFailed(`不允许的文件类型：${disallowed.join('、')}`);
            }
