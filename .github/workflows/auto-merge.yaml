name: Auto Merge (CSV only)

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: 检查是否只改 csv
        id: check
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100,
            });

            const allowed = ['.csv'];
            const ok = files.every(f =>
              allowed.some(ext => f.filename.toLowerCase().endsWith(ext))
            );

            core.setOutput('ok', ok);

      - name: 启用 auto-merge
        if: steps.check.outputs.ok == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            await github.graphql(`
              mutation {
                enablePullRequestAutoMerge(input: {
                  pullRequestId: "${context.payload.pull_request.node_id}",
                  mergeMethod: REBASE
                }) {
                  clientMutationId
                }
              }
            `);

      - name: 禁用 auto-merge
        if: steps.check.outputs.ok != 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            // 非纯 CSV 的 PR 关闭 auto-merge，等待人工 review 后手动合并
            try {
              await github.graphql(`
                mutation {
                  disablePullRequestAutoMerge(input: {
                    pullRequestId: "${context.payload.pull_request.node_id}"
                  }) {
                    clientMutationId
                  }
                }
              `);
            } catch (e) {
              // auto-merge 可能之前未启用，忽略即可
              core.warning(`disable auto-merge skipped: ${e.message}`);
            }