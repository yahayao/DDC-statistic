name: Update DDC Statistics

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 */3 * *"

permissions:
  contents: read

jobs:
  update-statistics:
    runs-on: ubuntu-latest
    env:
      DATASET_DIR: data
      STATS_FILE: data/statistics.json
    steps:
      - name: Validate GitHub App secrets
        env:
          GH_APP_ID: ${{ secrets.GH_APP_ID }}
          GH_APP_PRIVATE_KEY: ${{ secrets.GH_APP_PRIVATE_KEY }}
        run: |
          if [ -z "$GH_APP_ID" ] || [ -z "$GH_APP_PRIVATE_KEY" ]; then
            echo "::error::Missing GH_APP_ID or GH_APP_PRIVATE_KEY secret."
            echo "::error::Create a GitHub App and add its credentials to repository secrets."
            exit 1
          fi

      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Sync dependencies from lock
        run: |
          uv sync --frozen --python 3.12

      - name: Generate statistics data
        run: |
          pushd "$DATASET_DIR"
          uv run --frozen --python 3.12 ../generate_statistics.py
          popd

      - name: Update README report
        run: |
          uv run --frozen --python 3.12 update_readme.py --stats-file "$STATS_FILE" --readme README.md

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git remote set-url origin "https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/${{ github.repository }}.git"

          if git diff --quiet README.md; then
            echo "README.md is already up to date."
            exit 0
          fi

          git add README.md
          git commit -m "chore: update DDC statistics report [skip ci]"
          git push origin HEAD:${{ github.ref_name }}