name: csv_only_check

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - name: 检查变更文件是否仅含 .csv
        id: csv
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.payload.pull_request.number;

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number,
              per_page: 100
            });

            if (files.length === 0) {
              core.setOutput('csv_only', 'false');
              core.setFailed('没有检测到变更文件。');
              return;
            }

            const nonCsv = files.filter(f => !f.filename.toLowerCase().endsWith('.csv'));
            core.setOutput('csv_only', nonCsv.length === 0 ? 'true' : 'false');

            if (nonCsv.length === 0) {
              core.notice('CSV-only PR detected.');
            } else {
              core.setFailed(`Non-CSV files present: ${nonCsv.map(f => f.filename).join(', ')}`);
              return;
            }

      - name: Validate GitHub App secrets
        if: steps.csv.outputs.csv_only == 'true'
        env:
          GH_APP_ID: ${{ secrets.GH_APP_ID }}
          GH_APP_PRIVATE_KEY: ${{ secrets.GH_APP_PRIVATE_KEY }}
        run: |
          if [ -z "$GH_APP_ID" ] || [ -z "$GH_APP_PRIVATE_KEY" ]; then
            echo "::error::Missing GH_APP_ID or GH_APP_PRIVATE_KEY secret."
            echo "::error::Create a GitHub App and add its credentials to repository secrets."
            exit 1
          fi

      # - name: Create GitHub App token
      #   if: steps.csv.outputs.csv_only == 'true'
      #   id: app-token
      #   uses: actions/create-github-app-token@v1
      #   with:
      #     app-id: ${{ secrets.GH_APP_ID }}
      #     private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
      #     owner: ${{ github.repository_owner }}

