name: csv_only_check

on:
  push:
    branches:
      - main
    paths:
      - '**.csv'

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: 检查变更文件是否仅含 .csv
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const before = context.payload.before;
            const after = context.payload.after || context.sha;

            if (!before || /^0+$/.test(before)) {
              core.info('无法获取有效的 base commit（可能是首次提交），跳过检查。');
              return;
            }

            // 获取提交区间的变更文件列表
            const { data: comparison } = await github.rest.repos.compareCommits({
              owner,
              repo,
              base: before,
              head: after,
              per_page: 100
            });

            const files = comparison.files || [];

            if (files.length === 0) {
              core.setFailed('没有检测到变更文件。');
              return;
            }

            const filenames = files.map(f => f.filename);
            core.info(`变更文件：${filenames.join('、')}`);

            // 判断所有文件后缀是否为 .csv（忽略大小写）
            const allowedExtensions = ['.csv'];
            const allAllowed = files.every(f =>
              allowedExtensions.some(ext => f.filename.toLowerCase().endsWith(ext))
            );

            if (allAllowed) {
              core.info('所有变更文件均为 .csv，检查通过。');
            } else {
              const disallowed = files
                .filter(f => !allowedExtensions.some(ext => f.filename.toLowerCase().endsWith(ext)))
                .map(f => f.filename);
              core.setFailed(`不允许的文件类型：${disallowed.join('、')}`);
            }
